version: 2
updates:
  # Python dependencies (pip/uv)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "America/New_York"
    # Newly published versions may be unstable or supply-chain compromised;
    # wait 7 days before opening update PRs
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(python):"
    groups:
      # Security updates stay ungrouped so they are handled individually
      python-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Ruby/Jekyll dependencies (Bundler)
  - package-ecosystem: "bundler"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "jekyll"
    commit-message:
      prefix: "deps(jekyll):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions):"
