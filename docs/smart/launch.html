<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching UsTxGNN SMART App...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
        }
        h1 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <h1>UsTxGNN Drug Repurposing</h1>
        <p>Connecting to EHR...</p>
    </div>
    <div class="error" id="error" style="display: none;">
        <h2>Launch Error</h2>
        <p id="error-message"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.4/build/fhir-client.min.js"></script>
    <script>
        // SMART on FHIR configuration
        const CLIENT_ID = "ustxgnn-smart-app";
        const REDIRECT_URI = window.location.origin + "/smart/app.html";

        FHIR.oauth2.authorize({
            client_id: CLIENT_ID,
            scope: "launch patient/MedicationRequest.read patient/MedicationStatement.read patient/Patient.read",
            redirect_uri: REDIRECT_URI,
            pkce: true
        }).catch(function(error) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("error").style.display = "block";
            document.getElementById("error-message").textContent = error.message || "Unknown error occurred";
        });
    </script>
</body>
</html>
