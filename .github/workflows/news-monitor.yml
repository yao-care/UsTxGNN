name: Health News Monitor - USA

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4 lxml

      - name: Check keywords.json
        run: |
          if [ ! -f data/news/keywords.json ]; then
            echo "Generating keywords..."
            python scripts/generate_news_keywords.py
          fi

      - name: Fetch from USA news sources
        run: python scripts/fetchers/us_news.py

      - name: Process and generate pages
        run: python scripts/process_news.py

      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          [ -d data/news ] && git add data/news/*.json 2>/dev/null || true
          [ -d docs/_news ] && git add docs/_news/
          [ -f docs/data/news-index.json ] && git add docs/data/news-index.json || true

          if git diff --staged --quiet; then
            echo "No news updates"
          else
            git commit -m "Update health news $(date +%Y-%m-%d-%H%M)"
            git push
          fi
